[build]
  command = "cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build"
  publish = "frontend/build"
  functions = "backend/netlify/functions"

[build.environment]
  POCKETBASE_URL = "https://suppa-pocketbase-production.up.railway.app"
  USER_ID = "prod_user"
  OPENAI_API_KEY = ""

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
